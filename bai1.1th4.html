<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Điểm Sinh Viên</title>

<style>
body{
    font-family: Arial;
    padding:20px;
}

input{
    padding:6px;
    margin-right:10px;
}

button{
    padding:6px 12px;
    cursor:pointer;
}

table{
    border-collapse: collapse;
    margin-top:20px;
    width:600px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#eee;
}

.yeu{
    background:yellow;
}

#stats{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Quản Lý Điểm Sinh Viên</h2>

<input type="text" id="name" placeholder="Họ tên">
<input type="number" id="score" placeholder="Điểm (0-10)" step="0.1">
<button id="addBtn">Thêm</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div id="stats">
Tổng SV: 0 | Điểm TB: 0
</div>

<script>

let students = [];

function getRank(score){
    if(score >= 8.5) return "Giỏi";
    if(score >= 7) return "Khá";
    if(score >= 5) return "Trung bình";
    return "Yếu";
}

function renderTable(){

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let total = 0;

    students.forEach((sv,index)=>{

        total += sv.score;

        let tr = document.createElement("tr");

        if(sv.score < 5){
            tr.classList.add("yeu");
        }

        tr.innerHTML = `
        <td>${index+1}</td>
        <td>${sv.name}</td>
        <td>${sv.score}</td>
        <td>${getRank(sv.score)}</td>
        <td>
            <button data-index="${index}" class="delete">Xóa</button>
        </td>
        `;

        tbody.appendChild(tr);

    });

    let avg = students.length ? (total/students.length).toFixed(2) : 0;

    document.getElementById("stats").innerText =
    `Tổng SV: ${students.length} | Điểm TB: ${avg}`;

}

function addStudent(){

    let name = document.getElementById("name").value.trim();
    let score = parseFloat(document.getElementById("score").value);

    if(name === ""){
        alert("Họ tên không được để trống");
        return;
    }

    if(isNaN(score) || score < 0 || score > 10){
        alert("Điểm phải từ 0 đến 10");
        return;
    }

    students.push({
        name:name,
        score:score
    });

    renderTable();

    document.getElementById("name").value = "";
    document.getElementById("score").value = "";
    document.getElementById("name").focus();
}

document.getElementById("addBtn").addEventListener("click",addStudent);

document.getElementById("score").addEventListener("keypress",function(e){
    if(e.key === "Enter"){
        addStudent();
    }
});

document.getElementById("tableBody").addEventListener("click",function(e){

    if(e.target.classList.contains("delete")){

        let index = e.target.dataset.index;

        students.splice(index,1);

        renderTable();
    }

});

</script>

</body>
</html>
